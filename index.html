<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jollof Rush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <p class="eyebrow">Naija web game</p>
        <h1>Jollof Rush</h1>
      </div>
      <article><span>Score</span><strong id="score">0</strong></article>
      <article><span>Time</span><strong id="time">45</strong></article>
      <button id="startBtn">Start</button>
    </section>
    <canvas id="game" width="900" height="520" aria-label="Jollof Rush game canvas"></canvas>
    <p class="hint">Move the bowl with your mouse, touch, or arrow keys. Catch ingredients. Avoid burnt pots.</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
