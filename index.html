<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jollof Rush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div>
        <p class="eyebrow">Naija web game</p>
        <h1>Jollof Rush</h1>
      </div>
      <article><span>Score</span><strong id="score">0</strong></article>
      <article><span>Time</span><strong id="time">45</strong></article>
      <button id="startBtn">Start</button>
      <button id="pauseBtn" disabled>Pause</button>
    </section>
    <section class="legend" aria-label="Game item guide">
      <span>Catch: 🍚 rice</span>
      <span>🌶️ pepper</span>
      <span>🍅 tomato</span>
      <span>🍗 chicken</span>
      <span>Avoid: 🔥 burnt pot</span>
    </section>
    <canvas id="game" width="900" height="520" aria-label="Jollof Rush game canvas"></canvas>
    <p class="hint">Move the bowl with your mouse, touch, or arrow keys. Catch the food icons. Avoid the fire.</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
